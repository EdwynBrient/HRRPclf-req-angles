model_name: mstar_cbn
figure_path: ./results/Samples/ mstar_cbn

epochs: 2000
batch_size: 128
lr: 0.0001
loss: 1ser

clf:
  mod_ch: 32         # backbone plus large
  ch_mul: [1, 2, 3, 4]  # +1 niveau de downsampling
  num_res: 2         # plus de blocs résiduels par niveau
  emb_dim: 96       # tête plus expressive
  dropout: 0.05
  cond_levels: [0, 1, 2]
  
dataset: MSTAR
data_path: "data/MSTAR_hrrp.pkl"
split:
  val_size: 0.15
  test_size: 0.15
  stratified: true
  cv_folds: 5
  fold_index: 0
inf_mode: step
inf_every_n_step: 2000
inf_every_n_epoch: 1

conditionned:
  bool: 1
  cond_op: cbn # film or cat or cbn
